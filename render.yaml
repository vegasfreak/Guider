services:
  - type: web
    name: mindguide-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npx tsx server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SESSION_SECRET
        generateValue: true
      - key: RENDER
        value: "true"
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1